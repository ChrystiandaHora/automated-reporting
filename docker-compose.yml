services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/munka.db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - munka_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  celery_worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/munka.db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - munka_data:/data
    depends_on:
      - redis
    command: celery -A celery_app worker --loglevel=info --concurrency=5
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  munka_data:
  redis_data:
